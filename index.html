<!DOCTYPE html>
<html>
<head>
  <title>Location AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.1/aframe/build/aframe-ar.min.js"></script>

  <!-- animation用 -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- コイル表示 -->
    <a-entity
      gltf-model="./assets/magnemite/scene.gltf"
      rotation="0 180 0"
      scale="0.15 0.15 0.15"
      gps-entity-place="latitude: 35.8261221; longitude: 139.9552363;"
      animation-mixer>
    </a-entity>

    <a-camera gps-camera rotation-reader></a-camera>

  </a-scene>
</body>
</html>
